server:
  port: 8080
  tomcat:
    threads:
      max: 500
      min-spare: 50
    accept-count: 300

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50   # 数据库连接池，设为核心线程数的 10%~20%
      minimum-idle: 20
      connection-timeout: 10000  # 超时缩短到 10 秒，快速失败，避免线程挂死
  data:
    redis:
      host: localhost
      port: 6379
      password:
      # 集群模式配置（默认关闭，开启后使用集群模式）
      cluster:
        enabled: false
        nodes:
          - localhost:7001
          - localhost:7002
          - localhost:7003
          - localhost:7004
          - localhost:7005
          - localhost:7006
      lettuce:
        pool:
          max-active: 50  # 测试先放大
          max-idle: 20 # 测试先放大
          min-idle: 2
        # 集群拓扑刷新配置
        cluster:
          refresh:
            adaptive: true
            period: 30000
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0
          max-interval: 10000ms
        acknowledge-mode: auto
        default-requeue-rejected: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.test.seckill.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.test.seckill.mapper:  WARN  # 测试先关闭日志


